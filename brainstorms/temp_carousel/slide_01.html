<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Design Preview</title>
  <!-- Google Fonts integration for Tiempos/Cormorant equivalent and Styrene/Inter equivalent -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Inline overrides if any dynamic options are specified */
    #canvas-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="canvas-root">
    
        <div class="canvas-container theme-light ratio-portrait">
          <div class="layout-hook">
            <div class="hook-badge">✻ ZORIXEL</div>
            <div class="hook-title">3 Secrets to Make Your Sites Premium</div>
            <div class="hook-subtitle">No AI Slop · Design Discipline</div>
            <div class="hook-preview-cards">
              <div class="preview-card premium">Ditch default spacing</div>
<div class="preview-card premium">Limit your color chroma</div>
<div class="preview-card premium">Floating paper card panels</div>

            </div>
            <div class="hook-footnote"><span>Stop building templates that look exactly like generic generator outputs.</span></div>
          </div>
        </div>
        
  </div>
</body>
</html>
